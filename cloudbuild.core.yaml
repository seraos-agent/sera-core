# Dedicated build path for the private SERA Core runtime. The existing
# Dockerfile remains exclusively for the public reception service.
substitutions:
  # Keep private Core images in Singapore, alongside its Cloud Run service.
  _IMAGE: asia-southeast1-docker.pkg.dev/$PROJECT_ID/sera-core-images/sera-core-api

steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '--file', 'Dockerfile.core', '--tag', '${_IMAGE}', '.']

images:
  - '${_IMAGE}'
